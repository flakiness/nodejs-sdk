name: Test git in container

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-git-in-container:
    runs-on: ubuntu-latest
    container: node:24
    steps:
      - uses: actions/checkout@v4

      - name: Verify git fails without safe.directory
        run: |
          echo "--- Testing bare git rev-parse (should fail) ---"
          if git rev-parse --show-toplevel 2>&1; then
            echo "UNEXPECTED: git rev-parse succeeded without safe.directory fix"
            exit 1
          else
            echo "EXPECTED: git rev-parse failed (dubious ownership)"
          fi

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Build SDK
        run: |
          pnpm i --frozen-lockfile
          pnpm exec kubik ./build.mts

      - name: Test GitWorktree methods all succeed
        run: |
          node -e "
            import { GitWorktree } from '@flakiness/sdk';

            const wt = GitWorktree.create('.');
            console.log('rootPath:', wt.rootPath());

            const commitId = wt.headCommitId();
            console.log('headCommitId:', commitId);
            if (!commitId || commitId.length !== 40)
              throw new Error('Invalid commit id: ' + commitId);

            const gitPath = wt.gitPath(wt.rootPath() + '/package.json');
            console.log('gitPath:', gitPath);
            if (gitPath !== 'package.json')
              throw new Error('Unexpected gitPath: ' + gitPath);

            const absPath = wt.absolutePath('package.json');
            console.log('absolutePath:', absPath);
            if (!absPath.endsWith('/package.json'))
              throw new Error('Unexpected absolutePath: ' + absPath);

            const commits = await wt.listCommits(5);
            console.log('listCommits returned', commits.length, 'commits');
            if (commits.length === 0)
              throw new Error('Expected at least 1 commit');
            if (commits[0].commitId !== commitId)
              throw new Error('First commit id mismatch');

            console.log('All GitWorktree methods passed!');
          "
